<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MILF Estate</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div style="text-align:center">
      <img src="judy.png" alt="Loading...">
      <p style="color:#fff; font-weight:bold; margin-top:1rem">Loading listings...</p>
    </div>
  </div>

  <main class="container">
    <h1>MILF Estate</h1>

    <!-- Filters -->
    <details>
      <summary>Filters</summary>
      <form id="filter-form" style="margin-top:.5rem">
        <div class="filter-row">
          <label>Building <input type="text" name="structure" placeholder="e.g. Sukhumvit"></label>
          <label>Status
            <select name="status">
              <option value="">All</option>
              <option value="Available">Available</option>
              <option value="Upcoming">Upcoming</option>
              <option value="To Check">To Check</option>
              <option value="Not Available">Not Available</option>
              <option value="Sale W.Tenant">Sale W.Tenant</option>
              <option value="Sale R.T.M.I.">Sale R.T.M.I.</option>
            </select>
          </label>
        </div>
        <div class="filter-row">
          <label>Min Rent <input type="number" name="minRent" placeholder="0"></label>
          <label>Max Rent <input type="number" name="maxRent" placeholder="any"></label>
          <label>Min Sale <input type="number" name="minSale" placeholder="0"></label>
          <label>Max Sale <input type="number" name="maxSale" placeholder="any"></label>
        </div>
        <div class="filter-row">
          <label>Bedrooms (min) <input type="number" name="minBed" placeholder="0"></label>
          <label>Bedrooms (max) <input type="number" name="maxBed" placeholder="any"></label>
          <label>Bathrooms (min) <input type="number" name="minBath" placeholder="0"></label>
          <label>Bathrooms (max) <input type="number" name="maxBath" placeholder="any"></label>
        </div>
        <div class="filter-row">
          <label>Min SQm <input type="number" name="minSqm" placeholder="0"></label>
          <label>Max SQm <input type="number" name="maxSqm" placeholder="any"></label>
        </div>
        <div class="filter-row" style="margin-top:.5rem">
          <label>Room / ID <input type="text" name="idSearch" placeholder="e.g. 123"></label>
          <button type="submit" style="flex:0">Apply</button>
          <button type="button" id="clear-btn" class="secondary" style="flex:0">Clear</button>
        </div>
      </form>
    </details>

    <!-- Sort -->
    <details>
      <summary>Sort</summary>
      <div class="filter-row" style="margin-top:.5rem">
        <label>Sort by
          <select id="sort-field">
            <option value="">(none)</option>
            <option value="structure">Building</option>
            <option value="rent">Rent</option>
            <option value="sale">Sale Price</option>
            <option value="SQm">Area</option>
            <option value="bedrooms">Bedrooms</option>
          </select>
        </label>
        <label><input type="checkbox" id="sort-desc"> Descending</label>
      </div>
    </details>

    <div id="result-count"></div>
    <div id="listings" class="card-grid"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <!-- Photo overlay -->
  <div id="photo-overlay">
    <nav class="topbar">
      <button id="overlay-close" class="secondary outline" style="padding:.3rem .8rem;margin:0">&larr; Back</button>
      <span class="title" id="overlay-title"></span>
      <span class="tag" id="overlay-tag"></span>
    </nav>
    <iframe id="overlay-frame" src="about:blank"></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
