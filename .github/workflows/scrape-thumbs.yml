name: Update thumbnail map

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 UTC (13:00 Bangkok time)
  workflow_dispatch:
    inputs:
      limit:
        description: "Max listings to scrape (0 = all)"
        default: "0"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape photo URLs
        run: node scrape-thumbs.js --limit ${{ github.event.inputs.limit || '0' }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thumb-map.json
          git diff --cached --quiet || (git commit -m "Update thumb-map.json" && git push)
