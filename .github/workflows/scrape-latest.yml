name: Scrape photos (latest 100)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape latest 100 listings
        run: node scrape-thumbs.js --last --limit 100

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thumb-map.json
          git diff --cached --quiet || (git commit -m "Update thumb-map.json (latest 100)" && git push)
